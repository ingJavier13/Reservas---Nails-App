version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: nails_db_container
    environment:
      POSTGRES_USER: javi_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: nails_appointments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: